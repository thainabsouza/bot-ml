services:
  app:
    build: .
    command: node src/app.js
    container_name: ml-app
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules # 👈 IMPORTANTE

  worker:
    build: .
    command: node src/workers/botWorker.js
    container_name: ml-worker
    depends_on:
      - mongo
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules # 👈 IMPORTANTE

  mongo:
    image: mongo:6
    container_name: ml-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
